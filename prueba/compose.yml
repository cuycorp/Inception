services:
  nginx:
    image: nginx:latest 
    ports: 
      - "8888:80" 
    depends_on: 
      - wordpress
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - wp_data:/var/www/html:ro
    #replace: COPY conf/nginx.conf /etc/nginx/conf.d/default.conf so that there is no bind mount  
    networks:
      - inception


  maria-db:
    image: mariadb:lts-ubi9  
    environment: 
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: exampledb
      MYSQL_USER: exampleuser
      MYSQL_PASSWORD: examplepass
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inception

  wordpress:
    image: wordpress:php8.2-fpm
    environment:
      WORDPRESS_DB_HOST: maria-db
      WORDPRESS_DB_USER: exampleuser
      WORDPRESS_DB_PASSWORD: examplepass
      WORDPRESS_DB_NAME: exampledb
    networks:
      - inception
    depends_on: 
      - maria-db
    volumes:
      - wp_data:/var/www/html

volumes:
  wp_data:
    # driver_opts:
      # type: none
      # device: ./home/mcamaren/data/wordpress /para maquina virtual
      # o: bind

  db_data: 
    # driver_opts:
      # type: none
      # device: ./home/mcamaren/data/maria-db /para maquina virtual
      # o: bind

networks:
  inception:
    driver: bridge

