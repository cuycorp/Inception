[www]
; php processes will run as www-data:www-data
user = www-data
group = www-data

; port 9000, default fastcgi port
listen = 9000

listen.owner = www-data
listen.group = www-data

; define how php handles incoming traffic 
pm = dynamic
pm.max_children = 5
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3

; Optional but recommended: kills a worker after 500 requests to prevent memory leaks
pm.max_requests = 500

; This ensures your Docker environment variables are visible to PHP
clear_env = no