services:
  nginx:
    build: ./requirements/nginx
    container_name: nginx
    ports: 
      - "443:443" 
    depends_on: 
      - wordpress
    volumes:
      - wp_data:/var/www/html:ro
    networks:
      - inception


  mariadb:
    build: ./requirements/mariadb
    container_name: mariadb
    env_file:
    - .env
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - inception
    restart: always
    secrets:
      - db_root_password
      - db_password

  wordpress:
    build: ./requirements/wordpress 
    container_name: wordpressmiau
    env_file:
    - .env
    networks:
      - inception
    depends_on: 
      - mariadb
    volumes:
      - wp_data:/var/www/html
    

volumes:
  wp_data:
    driver_opts:
      type: none
      device: ${HOME}/data/wordpress
      o: bind

  db_data: 
    driver_opts:
      type: none
      device: ${HOME}/data/maria-db
      o: bind

networks:
  inception:
    driver: bridge



secrets:
  db_root_password:
    file: ../secrets/db_root_password.txt
  db_password:
    file: ../secrets/db_password.txt